  var BASE = '/my-blog';
  function pad2(n){ return String(n).padStart(2,'0'); }

    var d = new Date(Date.UTC(2000, mm - 1, dd, 12, 0, 0));
    return (d.getUTCMonth() + 1) === mm && d.getUTCDate() === dd;
  }

  window.gotoToday = function(){
    try {
      var fmt = new Intl.DateTimeFormat('de-DE', {
        timeZone: 'Asia/Shanghai',
        year: 'numeric', month: '2-digit', day: '2-digit'
      });
      var parts = fmt.formatToParts(new Date());
      var by = {};
      parts.forEach(p => by[p.type] = p.value);
      var mm = by.month;
      var dd = by.day;
      var key = mm + '-' + dd;
      location.href = (BASE + '/almanac/' + key + '/').replace(/\/{2,}/g, '/');

      var m = String(d.getMonth()+1).padStart(2,'0');

    }

    if (!v) return false;

    // 允许纯数字：MMDD 或 MDD（如 703 → 07-03）
    var m = v.match(/^(\d{3,4})$/);
    if (!m) { 
      alert('请输入形如 MMDD 的数字（如 703 或 1129）'); 
      return false; 
    }

    var digits = m[1];
    var mm, dd;
    if (digits.length === 3) { // 703 → 07-03
      mm = +digits[0];
      dd = +digits.slice(1);
    } else { // 0703 → 07-03
      mm = +digits.slice(0, 2);
      dd = +digits.slice(2);
    }

    if (!validMD(mm, dd)) { 
      alert('无效日期'); 
      return false; 
    }

    var key = pad2(mm) + '-' + pad2(dd);

  };

  // ==== 新增：左右方向键快捷导航 ====

  var NEXT = (BASE + '/almanac/04-02/').replace(/\/{2,}/g, '/');

  function isEditableTarget(el){
    if (!el) return false;
    if (el.isContentEditable) return true;
    var tag = (el.tagName || '').toUpperCase();
    return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
  }

  document.addEventListener('keydown', function(e){
    // 忽略被其它逻辑捕获、含修饰键、或正处于可编辑区域的按键
    if (e.defaultPrevented) return;
    if (e.altKey || e.ctrlKey || e.metaKey || e.shiftKey) return;
    if (isEditableTarget(e.target)) return;

    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      location.href = PRE;
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      location.href = NEXT;
    }
  });
})();</script></div></div></div><div class="pure-u-1-4 hidden_mid_and_down"><div id="sidebar"><div class="widget"><div class="widget-title"><i class="fa fa-star-o"></i> Tags</div><div class="tagcloud"><ul class="tagcloud"><li class="tagcloud"><a href="/my-blog/tags/%E7%BE%8E%E9%A3%9F/" title="美食" rel="5">美食</a><span class="tagcloud">(5)</span></li></ul></div></div><div class="widget"><div class="widget-title"><i class="fa fa-file-o"></i> Updated</div><ul class="entry"><li><a href="/my-blog/2026/04/08/%E7%83%A4%E9%B8%A1%E8%85%BF-%E7%A9%BA%E6%B0%94%E7%82%B8%E9%94%85/" title="烤鸡腿(空气炸锅)">烤鸡腿(空气炸锅)</a></li><li><a href="/my-blog/2026/04/06/%E8%8F%A0%E8%8F%9C%E8%B1%86%E8%85%90%E6%B1%A4/" title="菠菜豆腐汤">菠菜豆腐汤</a></li><li><a href="/my-blog/2026/04/06/%E5%8D%A4%E9%B8%A1%E8%85%BF/" title="卤鸡腿（电压力锅版）">卤鸡腿（电压力锅版）</a></li><li><a href="/my-blog/2026/04/06/%E7%8E%9B%E8%8A%AC%E8%9B%8B%E7%B3%95/" title="玛芬蛋糕(无秤/无打蛋器版)">玛芬蛋糕(无秤/无打蛋器版)</a></li><li><a href="/my-blog/2026/04/06/%E8%8C%B6%E5%8F%B6%E8%9B%8B/" title="茶叶蛋">茶叶蛋</a></li><li><a href="/my-blog/2026/03/12/hello-world/" title="Hello World">Hello World</a></li></ul></div></div></div><div class="pure-u-1 pure-u-md-3-4"><div id="footer">Copyright © 2026-2026 <a href="/my-blog/." rel="nofollow">Meizhi's Blog.</a></div></div></div><script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@fancyapps/fancybox@3.5.7/dist/jquery.fancybox.min.js"></script><script type="text/javascript" src="/my-blog/js/fancybox.js?v=1.0.0"></script><link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@fancyapps/fancybox@3.5.7/dist/jquery.fancybox.min.css"><script type="text/javascript" src="/my-blog/js/customJS.js?v=1.0.0"></script><script type="text/javascript" src="/my-blog/js/copycode.js?v=1.0.0" successtext="Copy Successed!"></script><link rel="stylesheet" type="text/css" href="/my-blog/css/copycode.css?v=1.0.0"><script type="text/javascript" src="/my-blog/js/codeblock-resizer.js?v=1.0.0"></script><script type="text/javascript
